<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Akhir - SIM Perikanan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0c1428 0%, #1e3a8a 50%, #2563eb 100%);
            --card-bg: rgba(30, 58, 138, 0.75);
            --card-border: rgba(147, 197, 253, 0.2);
            --accent: #60a5fa;
            --text-yellow: #facc15;
        }
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }
        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { 
            width: 100%; 
            max-width: 740px; 
            display: flex; 
            flex-direction: column; 
            gap: 1.1rem; 
        }
        header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .logo-title { 
            font-size: 2rem; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.6rem; 
        }
        .subtitle-yellow { 
            color: var(--text-yellow); 
            font-weight: 600; 
            font-size: 1.25rem; 
        }
        .subtitle-main { 
            font-size: 1.05rem; 
            opacity: 0.9; 
            margin-top: 0.4rem; 
        }
        .btn-main-menu, .btn-sub-menu {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            color: #f1f5f9;
            font-weight: 600;
            font-size: 1.08rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-main-menu:hover, .btn-sub-menu:hover {
            background: rgba(59, 130, 246, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.3);
        }

        /* DETAIL DESIGN TOMBOL SESUAI SCREENSHOT ANDA */
        .website-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(16, 185, 129, 0.1);
            backdrop-filter: blur(12px);
            border: 2px solid #10b981;
            border-radius: 24px;
            padding: 1.5rem 2rem;
            margin-top: 0.5rem;
            width: 100%;
            text-decoration: none;
            color: #10b981;
            transition: all 0.3s ease;
        }
        .btn-left-content {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: left;
            font-weight: 700;
            font-size: 1.3rem;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }
        .btn-icon-globe {
            font-size: 1.8rem;
        }
        .btn-icon-arrow {
            font-size: 1.6rem;
        }
        .website-btn:hover {
            background: rgba(16, 185, 129, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }

        .arrow { 
            transition: transform 0.3s ease; 
            font-size: 1.1rem; 
        }
        .active .arrow { 
            transform: rotate(180deg); 
        }
        .submenu-container { 
            display: none; 
            flex-direction: column; 
            gap: 0.8rem; 
            padding-left: 1rem; 
        }
        .content-container {
            display: none;
            padding: 1.6rem;
            background: rgba(15, 23, 42, 0.85);
            border-radius: 14px;
            border: 1px solid rgba(147, 197, 253, 0.15);
            max-height: 75vh;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            background: rgba(30, 58, 138, 0.4);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 0.95rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            font-size: 0.95rem;
        }
        th { 
            background: linear-gradient(to right, #1e40af, #3b82f6); 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 10;
        }
        tr:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        footer { 
            text-align: center; 
            margin-top: auto; 
            padding: 3rem 0 1rem; 
            font-size: 0.85rem; 
            opacity: 0.7; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">📚 Tugas Akhir</div>
            <div class="subtitle-yellow">Kelompok 3 POKLAHSAR</div>
            <div class="subtitle-main">Sistem Informasi Manajemen Perikanan</div>
        </header>

        <div class="btn-main-menu" onclick="toggleMenu('menu-individu', this)">
            <span>📁 INDIVIDU</span>
            <span class="arrow">▼</span>
        </div>
        <div id="menu-individu" class="submenu-container">
            <a href="https://herny-noor-aziziah.github.io/HERNYBARUUUU/" target="_blank" class="btn-sub-menu">
                <span>📦 Rencana Usaha Bersama</span>
                <span class="arrow">↗</span>
            </a>
        </div>

        <div class="btn-main-menu" onclick="toggleMenu('menu-kelompok', this)">
            <span>📁 KELOMPOK</span>
            <span class="arrow">▼</span>
        </div>
        <div id="menu-kelompok" class="submenu-container">
            <div class="btn-sub-menu" onclick="showOnlyContent('sejarah-content', this)">📖 Sejarah Kelompok <span class="arrow">▼</span></div>
            <div id="sejarah-content" class="content-container">
                <h3 style="color:var(--text-yellow); margin-bottom:1rem;">Sejarah Kelompok</h3>
                <p><strong>POKHLAHSAR BUNGA MERAH</strong><br><br>
                Kelompok Pengolah dan Pemasar
